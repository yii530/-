<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-pink-50 text-gray-800 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-4 text-blue-600 tracking-tight">🚀 AI Prompt 智能寶庫</h1>
            <div id="status" class="text-sm font-medium text-pink-400">正在讀取雲端資料...</div>
        </header>

        <div class="max-w-xl mx-auto mb-10">
            <input type="text" id="search" placeholder="🔍 搜尋標題、類別或種類..." 
                   class="w-full p-4 rounded-3xl border-4 border-yellow-300 shadow-md focus:outline-none focus:ring-4 focus:ring-blue-200 transition">
        </div>

        <div id="prompt-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        const SPREADSHEET_ID = "12-8zBeRwO6FEKdlYyuXVmmNW1XMFACHMWdNvr_QKL2c";
        const API_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tq=select%20A,B,C,E`;
        let allPrompts = [];

        async function fetchGoogleSheetData() {
            try {
                const response = await fetch(API_URL);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                
                allPrompts = json.table.rows.map(row => ({
                    category: row.c[0]?.v || "未分類", 
                    type: row.c[1]?.v || "",
                    title: row.c[2]?.v || "無標題",    
                    content: row.c[3]?.v || "無內容" 
                })).filter(p => p.title !== "無標題");
                
                document.getElementById('status').innerText = "✨ 資料同步成功，盡情揮灑創意吧！";
                renderPrompts();
            } catch (err) {
                document.getElementById('status').innerText = "⚠️ 無法讀取資料，請確認權限設定";
            }
        }

        function renderPrompts(filter = "") {
            const grid = document.getElementById('prompt-grid');
            // 隨機顏色陣列，產生撞色效果
            const colors = ['border-blue-400', 'border-pink-400', 'border-yellow-400'];
            
            grid.innerHTML = allPrompts.filter(p => 
                (p.title || "").includes(filter) || 
                (p.category || "").includes(filter) || 
                (p.type || "").includes(filter)
            ).map((p, index) => {
                const borderColor = colors[index % colors.length];
                return `
                    <div class="bg-white rounded-3xl p-6 border-b-8 ${borderColor} shadow-lg hover:-translate-y-2 transition duration-300">
                        <div class="flex gap-2 mb-3">
                            <span class="text-xs font-bold text-blue-600 bg-blue-100 px-3 py-1 rounded-full">${p.category}</span>
                            <span class="text-xs font-bold text-pink-600 bg-pink-100 px-3 py-1 rounded-full">${p.type}</span>
                        </div>
                        <h3 class="text-xl font-bold mb-3 text-gray-800">${p.title}</h3>
                        <p class="text-gray-600 text-sm mb-6 h-24 overflow-y-auto whitespace-pre-wrap">${p.content}</p>
                        <button onclick="navigator.clipboard.writeText(\`${p.content}\`)" 
                                class="w-full py-3 bg-yellow-400 text-white font-bold rounded-2xl hover:bg-yellow-500 shadow-md transition transform active:scale-95">
                            複製 Prompt
                        </button>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => renderPrompts(e.target.value));
        fetchGoogleSheetData();
    </script>
</body>
</html>
