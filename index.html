<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold flex items-center justify-center gap-2 mb-4">🚀 AI Prompt 智能寶庫</h1>
            <a href="https://docs.google.com/spreadsheets/d/1oKvF9Hb0OQ9uCMI-BiWwfi6VG4ZftFkLY8-RVa9_9fM/edit" 
               target="_blank" class="text-sm text-gray-500 hover:text-blue-600 underline">📂 開啟原始資料 Google Sheet</a>
        </header>

        <div class="max-w-xl mx-auto mb-10">
            <input type="text" id="search" placeholder="🔍 搜尋提示詞..." 
                   class="w-full p-4 rounded-full border border-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div id="prompt-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- JavaScript 會自動填入資料 -->
        </div>
    </div>

    <script>
        const prompts = [
            { category: "內容創作", title: "影片清理", content: "你的角色是一位「內容結構化融合員」... (情境／衝擊／課題／對策架構)" },
            { category: "程式應用", title: "除錯梳理 (1)", content: "請先不要撰寫任何程式碼。針對目前出現的錯誤，進行系統性的分析與拆解..." },
            { category: "程式應用", title: "除錯梳理 (2)", content: "請先不要急著修改程式。根據你的分析，將每一個驗證與檢查的過程，逐一寫入..." },
            { category: "簡報表達", title: "簡報結構", content: "針對簡報的結構美，給我相關的建議。定義：強調簡報內容的條理與邏輯性。" },
            { category: "程式生成", title: "表單生成", content: "依據附件，為我設計一份「課前需求調查問卷」，題目約10~12題..." },
            { category: "文本優化", title: "課程推廣", content: "你是一名社群小編，擅長撰寫課程推廣文案，將我提供給資訊變成PO文..." }
        ];

        function renderPrompts(filter = "") {
            const grid = document.getElementById('prompt-grid');
            grid.innerHTML = prompts.filter(p => p.title.includes(filter) || p.category.includes(filter))
                .map(p => `
                    <div class="bg-white rounded-2xl p-6 border-t-4 border-purple-600 shadow-md">
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">${p.category}</span>
                        <h3 class="text-lg font-bold mt-3 mb-2">${p.title}</h3>
                        <p class="text-gray-600 text-sm mb-4 h-24 overflow-y-auto">${p.content}</p>
                        <button onclick="navigator.clipboard.writeText(\`${p.content}\`)" class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">複製 Prompt</button>
                    </div>
                `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => renderPrompts(e.target.value));
        renderPrompts();
    </script>
</body>
</html>
