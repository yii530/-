<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 提示詞智能寶庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .prompt-card { transition: transform 0.2s; }
        .prompt-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-10">
    <div class="container mx-auto px-4">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">AI 提示詞智能寶庫</h1>
            <p class="text-gray-600">高效 AI 協作，從精準提示詞開始</p>
        </header>

        <!-- 搜尋與篩選區域 -->
        <div class="max-w-2xl mx-auto mb-10">
            <input type="text" id="searchBar" placeholder="搜尋提示詞名稱..." class="w-full p-4 rounded-xl border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
        </div>

        <!-- 提示詞卡片容器 -->
        <div id="prompt-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 由 JavaScript 自動生成 -->
        </div>
    </div>

    <script>
        // 在此處維護您的提示詞資料
        const prompts = [
            {
                title: "內容結構化融合員",
                category: "AI 協作",
                content: "你的角色是一位「內容結構化融合員」，不是編輯、不是評論者。\n\n任務：\n1. 將多篇文章融合成一篇，維持「情境 / 衝擊 / 課題 / 對策」架構。\n2. 完全保留作者語意與立場，不得新增觀點、不得推論。\n3. 重複內容僅做語意等價刪減，保留核心訊息。\n4. 無法歸類者請註記，不得硬塞。\n\n輸出要求：\n總字數約 2000~2500 字，嚴格依照架構排序。"
            },
            {
                title: "系統除錯分析師",
                category: "AI 協作",
                content: "你的角色是一位系統除錯分析師。\n\n任務：\n1. 針對錯誤進行系統性分析與拆解。\n2. 逐一說明錯誤發生的原因。\n3. 依據你的分析，寫出驗證流程，包括：驗證點、依據與結果。"
            }
            // 這裡可以繼續新增更多物件...
        ];

        const container = document.getElementById('prompt-container');
        const searchBar = document.getElementById('searchBar');

        function renderPrompts(filter = "") {
            container.innerHTML = "";
            const filtered = prompts.filter(p => p.title.includes(filter) || p.category.includes(filter));
            
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl shadow-sm border-t-8 border-purple-500 prompt-card";
                card.innerHTML = `
                    <span class="text-xs font-semibold bg-purple-100 text-purple-700 px-3 py-1 rounded-full uppercase tracking-wider">${p.category}</span>
                    <h2 class="text-2xl font-bold mt-4 text-gray-800">${p.title}</h2>
                    <div class="mt-4 text-gray-600 text-sm leading-relaxed h-48 overflow-y-auto bg-gray-50 p-3 rounded-lg border border-gray-100 whitespace-pre-line">
                        ${p.content}
                    </div>
                    <button onclick="copyToClipboard(this)" class="mt-6 w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">複製 Prompt</button>
                `;
                container.appendChild(card);
            });
        }

        searchBar.addEventListener('input', (e) => renderPrompts(e.target.value));
        
        function copyToClipboard(button) {
            const content = button.previousElementSibling.innerText;
            navigator.clipboard.writeText(content).then(() => {
                const originalText = button.innerText;
                button.innerText = "已複製！";
                button.classList.add("bg-green-600");
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove("bg-green-600");
                }, 2000);
            });
        }

        // 初始化渲染
        renderPrompts();
    </script>
</body>
</html>
