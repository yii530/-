<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-4">🚀 AI Prompt 智能寶庫</h1>
            <div id="status" class="text-sm text-gray-400">正在讀取最新資料...</div>
        </header>

        <div class="max-w-xl mx-auto mb-10">
            <input type="text" id="search" placeholder="🔍 搜尋標題、類別或種類..." 
                   class="w-full p-4 rounded-full border border-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <div id="prompt-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const SPREADSHEET_ID = "12-8zBeRwO6FEKdlYyuXVmmNW1XMFACHMWdNvr_QKL2c";
        // 抓取 A, B, C, E 欄位 (忽略 D)
        const API_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tq=select%20A,B,C,E`;
        let allPrompts = [];

        async function fetchGoogleSheetData() {
            try {
                const response = await fetch(API_URL);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                
                // 映射邏輯: A=0(類別), B=1(種類), C=2(標題), E=3(提示詞)
                allPrompts = json.table.rows.map(row => ({
                    category: row.c[0]?.v || "未分類", 
                    type: row.c[1]?.v || "",
                    title: row.c[2]?.v || "無標題",    
                    content: row.c[3]?.v || "無內容" 
                })).filter(p => p.title !== "無標題");
                
                document.getElementById('status').innerText = "✅ 資料同步成功";
                renderPrompts();
            } catch (err) {
                document.getElementById('status').innerText = "⚠️ 無法讀取資料，請確認權限設定";
            }
        }

        function renderPrompts(filter = "") {
            const grid = document.getElementById('prompt-grid');
            grid.innerHTML = allPrompts.filter(p => 
                (p.title || "").includes(filter) || 
                (p.category || "").includes(filter) || 
                (p.type || "").includes(filter)
            ).map(p => `
                <div class="bg-white rounded-2xl p-6 border-t-4 border-purple-600 shadow-md">
                    <div class="flex gap-2">
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">${p.category}</span>
                        <span class="text-xs font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded">${p.type}</span>
                    </div>
                    <h3 class="text-lg font-bold mt-3 mb-2">${p.title}</h3>
                    <p class="text-gray-600 text-sm mb-4 h-24 overflow-y-auto whitespace-pre-wrap">${p.content}</p>
                    <button onclick="navigator.clipboard.writeText(\`${p.content}\`)" class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">複製 Prompt</button>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => renderPrompts(e.target.value));
        fetchGoogleSheetData();
    </script>
</body>
</html>
