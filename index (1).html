<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt 智能寶庫</title>
    <!-- 引入 Font Awesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --purple-tag: #8e44ad;
            --blue-tag: #2980b9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header 區域 */
        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .logo-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sheet-link {
            font-size: 14px;
            color: #555;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 25px;
        }
        .sheet-link:hover {
            text-decoration: underline;
        }

        /* 搜尋欄 */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 25px auto;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 1px solid #ccc;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(0, 123, 255, 0.2);
        }

        .search-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        /* 分類標籤 */
        .filter-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
            max-width: 800px;
        }

        .tag-btn {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .tag-btn.active, .tag-btn:hover {
            background-color: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }

        /* 區塊標題 */
        .section-title {
            width: 100%;
            max-width: 1200px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
        }

        /* 卡片網格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* 卡片樣式 */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-top: 5px solid var(--purple-tag);
            position: relative;
            height: 380px;
        }

        .card.type-content {
            border-top-color: #9b59b6;
        }
        .card.type-note {
            border-top-color: #3498db;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-category {
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 12px;
            align-self: flex-start;
        }

        .card.type-content .card-category {
            background-color: #f5eef8;
            color: #9b59b6;
        }

        .card.type-note .card-category {
            background-color: #ebf5fb;
            color: #3498db;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #222;
        }

        .card-prompt-box {
            background-color: #f8f9fa;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }

        /* 自訂滾動條樣式 */
        .card-prompt-box::-webkit-scrollbar {
            width: 6px;
        }
        .card-prompt-box::-webkit-scrollbar-thumb {
            background-color: #ddd;
            border-radius: 4px;
        }

        .copy-btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 12px;
            width: calc(100% - 40px);
            margin: 0 20px 20px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
            display: block;
        }

        .copy-btn:hover {
            background-color: #0056b3;
        }

        /* 讀取中提示 */
        .loading {
            text-align: center;
            font-size: 18px;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-title">🚀 AI Prompt 智能寶庫</div>
        <a href="https://docs.google.com/spreadsheets/d/12-8zBeRwO6FEKdlYyuXVmmNW1XMFACHMWdNvr_QKL2c/edit?gid=1480282197" target="_blank" class="sheet-link">
            <i class="fa-regular fa-file-excel"></i> 開啟原始資料 Google Sheet
        </a>
        
        <div class="search-container">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜尋提示詞...">
        </div>

        <div class="filter-tags" id="filterTags">
            <button class="tag-btn active" onclick="filterCategory('全部')">全部</button>
        </div>
    </header>

    <div class="section-title">🧠 AI 協思</div>

    <main class="card-grid" id="cardGrid">
        <div class="loading">經由 Google Sheet 讀取資料中...</div>
    </main>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/12-8zBeRwO6FEKdlYyuXVmmNW1XMFACHMWdNvr_QKL2c/export?format=csv&gid=1480282197';
        
        let allData = [];
        let currentCategory = '全部';

        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
            document.getElementById('searchInput').addEventListener('input', () => {
                renderCards();
            });
        });

        function fetchData() {
            fetch(sheetUrl)
                .then(response => response.text())
                .then(csvText => {
                    allData = parseCSV(csvText);
                    generateCategoryButtons();
                    renderCards();
                })
                .catch(error => {
                    console.error('Error fetching sheet data:', error);
                    document.getElementById('cardGrid').innerHTML = '<div class="loading" style="color:red;">資料載入失敗，請確認該 Google Sheet 是否已設定「知道連結的使用者均可檢視」。</div>';
                });
        }

        function parseCSV(text) {
            let lines = text.split('\n');
            let result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                let insideQuote = false;
                let entries = [];
                let currentEntry = '';
                
                for (let j = 0; j < lines[i].length; j++) {
                    let char = lines[i][j];
                    if (char === '"') {
                        insideQuote = !insideQuote;
                    } else if (char === ',' && !insideQuote) {
                        entries.push(currentEntry.trim().replace(/^"|"$/g, ''));
                        currentEntry = '';
                    } else {
                        currentEntry += char;
                    }
                }
                entries.push(currentEntry.trim().replace(/^"|"$/g, ''));

                if(entries.length >= 3 && entries[1] !== "") {
                    result.push({
                        category: entries[0] || '未分類',
                        title: entries[1],
                        prompt: entries[2] ? entries[2].replace(/\\n/g, '\n') : '' 
                    });
                }
            }
            return result;
        }

        function generateCategoryButtons() {
            const categories = ['全部', ...new Set(allData.map(item => item.category))];
            const tagsContainer = document.getElementById('filterTags');
            tagsContainer.innerHTML = ''; 

            categories.forEach(cat => {
                if(!cat) return;
                const btn = document.createElement('button');
                btn.className = `tag-btn ${cat === currentCategory ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => filterCategory(cat, btn);
                tagsContainer.appendChild(btn);
            });
        }

        function filterCategory(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
            if(element) {
                element.classList.add('active');
            }
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';

            const filteredData = allData.filter(item => {
                const matchesCategory = (currentCategory === '全部' || item.category === currentCategory);
                const matchesSearch = (item.title.toLowerCase().includes(searchQuery) || item.prompt.toLowerCase().includes(searchQuery));
                return matchesCategory && matchesSearch;
            });

            if (filteredData.length === 0) {
                grid.innerHTML = '<div class="loading">找不到相符的提示詞資料。</div>';
                return;
            }

            filteredData.forEach(item => {
                let typeClass = 'type-content';
                if(item.category.includes('筆記') || item.category.includes('程式')) {
                    typeClass = 'type-note';
                }

                const card = document.createElement('div');
                card.className = `card ${typeClass}`;

                card.innerHTML = `
                    <div class="card-body">
                        <div class="card-category">${item.category}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-prompt-box">${escapeHtml(item.prompt)}</div>
                    </div>
                    <button class="copy-btn" onclick="copyPrompt(this, \\`" + escapeJsString(item.prompt) + "\\`)">複製 Prompt</button>
                `;
                grid.appendChild(card);
            });
        }

        function copyPrompt(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.innerText;
                button.innerText = '✓ 已複製！';
                button.style.backgroundColor = '#2ecc71';
                setTimeout(() => {
                    button.innerText = originalText;
                    button.style.backgroundColor = 'var(--primary-color)';
                }, 1500);
            }).catch(err => {
                console.error('無法複製文字: ', err);
            });
        }

        // 安全字串處理
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeJsString(str) {
            return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        }
    </script>
</body>
</html>
